name: EDUTech CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [ 20.x ]

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: |
          server/package-lock.json
          client/package-lock.json

    # 1. Test Backend Server
    - name: Install Backend Dependencies
      run: |
        cd server
        npm ci

    - name: Compile Backend TypeScript
      run: |
        cd server
        npx tsc --noEmit

    # 2. Test Frontend Client
    - name: Install Frontend Dependencies
      run: |
        cd client
        npm ci --legacy-peer-deps

    - name: Build Next.js Client
      run: |
        cd client
        npm run build

    # 3. Spin up and test services
    - name: Start Express Server in Background
      run: |
        cd server
        npm run build
        npm start &
      env:
        PORT: 5000
        DATABASE_URL: "" # Fallback is active during offline testing

    - name: Wait for server response
      run: sleep 5

    - name: Run API Integration Tests
      run: node tests/api.test.js
